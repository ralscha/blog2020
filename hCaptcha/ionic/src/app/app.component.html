<ion-app>
  <ion-content class="ion-padding">
    <form [formRoot]="signupForm" (submit)="signupForm().valid() && submit()">
      <ion-item>
        <ion-input
          [required]="true"
          [spellcheck]="false"
          autocapitalize="off"
          autocomplete="username"
          label="Username"
          labelPlacement="stacked"
          [formField]="signupForm.username"
          type="text"
        />
      </ion-item>
      <ion-item>
        <ion-input
          [required]="true"
          [spellcheck]="false"
          autocapitalize="off"
          autocomplete="email"
          email
          label="Email"
          labelPlacement="stacked"
          [formField]="signupForm.email"
          type="email"
        />
      </ion-item>
      <ion-item>
        <ng-hcaptcha [formField]="signupForm.captcha" />
      </ion-item>
      <ion-button [disabled]="!signupForm().valid()" expand="block" type="submit"
        >Sign Up</ion-button
      >
    </form>
  </ion-content>
</ion-app>
